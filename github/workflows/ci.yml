name: CI — Testes Automatizados

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: taskflow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-secret-key-nao-importa-o-valor-aqui
      DEBUG: True
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/taskflow
      CORS_ALLOWED_ORIGINS: http://localhost:5500
      CSRF_TRUSTED_ORIGINS: http://localhost:8000

    steps:
      - name: Clona o repositório
        uses: actions/checkout@v4

      - name: Configura o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Instala as dependências
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Roda as migrations
        run: |
          cd backend
          python manage.py migrate

      - name: Roda os testes
        run: |
          cd backend
          python manage.py test